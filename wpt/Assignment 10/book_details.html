<!DOCTYPE html>
<html>
<head>
<title>Object Destructuring Example</title>

<script>

// Creating book object
let book = {
    bookId: 101,
    bookName: "JavaScript Basics",
    price: 450
};

// Destructuring object
let {bookId, bookName, price} = book;

// Display values
document.write("Book ID: " + bookId + "<br>");
document.write("Book Name: " + bookName + "<br>");
document.write("Price: " + price);

</script>

</head>

<body>
</body>
</html>
