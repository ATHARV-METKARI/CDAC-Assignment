<!DOCTYPE html>
<html>
<head>
<title>AJAX Product Table</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

    $("#load").click(function(){

        $.ajax({
            url: "https://fakestoreapi.com/products",
            method: "GET",
            success: function(data){

                var rows = "";

                for(var i=0; i<data.length; i++)
                {
                    rows += "<tr>";
                    rows += "<td>" + data[i].id + "</td>";
                    rows += "<td>" + data[i].title + "</td>";
                    rows += "<td>" + data[i].price + "</td>";
                    rows += "</tr>";
                }

                $("#tableBody").html(rows);
            }
        });

    });

});
</script>

</head>

<body>

<button id="load">Load Products</button>

<br><br>

<table border="1">
<tr>
<th>ID</th>
<th>Title</th>
<th>Price</th>
</tr>

<tbody id="tableBody"></tbody>

</table>

</body>
</html>
