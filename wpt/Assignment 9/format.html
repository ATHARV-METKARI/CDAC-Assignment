<!DOCTYPE html>
<html>
<head>
<title>Object to JSON Example</title>

<script>

// Object format
var student = {
    id: 101,
    name: "Atharv",
    email: "atharv@gmail.com"
};

// Convert Object → JSON
var jsonData = JSON.stringify(student);
document.write("JSON Format:<br>");
document.write(jsonData + "<br><br>");

// Convert JSON → Object
var objData = JSON.parse(jsonData);
document.write("Back to Object Format:<br>");
document.write("ID: " + objData.id + "<br>");
document.write("Name: " + objData.name + "<br>");
document.write("Email: " + objData.email);

</script>

</head>

<body>
</body>
</html>
