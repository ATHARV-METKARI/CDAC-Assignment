<!DOCTYPE html>
<html>
<head>
<title>Student JSON Example</title>
<script>

// Creating student object
var student = {
    StudentId: 101,
    StudentName: "Atharv",
    Grade: "A"
};

// Converting object to JSON format
var jsonData = JSON.stringify(student);

// Printing JSON data
document.write("JSON Format:<br>");
document.write(jsonData);

</script>
</head>

<body>
</body>
</html>
