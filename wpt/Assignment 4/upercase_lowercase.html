<!DOCTYPE html>
<html>
<head>
<title>Text Converter</title>
<script src="uper_lower.js" defer></script>
</head>

<body>

<h2>Text Converter</h2>

<input type="text" id="textInput" placeholder="Enter text">

<br><br>

<input type="radio" name="case" onclick="convertText('lower')"> LowerCase

<br><br>

<p id="result"></p>

</body>
</html>
